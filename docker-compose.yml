services:
  web:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trippilot
      POSTGRES_PASSWORD: trippilot
      POSTGRES_DB: trippilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
